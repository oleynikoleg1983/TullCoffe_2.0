<header class="app-header">
  @if (currentUser) {
    <div class="user-chip" aria-label="Current user">
      <svg class="user-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="currentColor"
          d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5Zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5Z"
        />
      </svg>
      <span class="user-name">{{ currentUser.name }}</span>
    </div>
  }

  @if (isAdmin) {
    <app-navigation-buttons></app-navigation-buttons>
  }
</header>
